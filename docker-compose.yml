# All values can be overridden via environment variables
# (Dokploy app env settings, or a .env file next to this compose file).
services:
  app:
    build: .
    expose:
      - "${PORT:-8080}"
    volumes:
      - easy-share-data:/data
    environment:
      DATA_DIR: /data
      PORT: "${PORT:-8080}"
      BASE_URL: "${BASE_URL:-}"
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-104857600}"
      RETENTION: "${RETENTION:-720h}"
    restart: unless-stopped

volumes:
  easy-share-data:
